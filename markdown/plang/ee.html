<p>The ideal would be to have svgs animate the text turning into
tokens.</p>
<p>For example:</p>
<svg width="350" height="60" xmlns="http://www.w3.org/2000/svg">
<text y="20">int x = 4;</text>
</svg>
<p>should have a following frame, turning into</p>
<svg width="350" height="60" xmlns="http://www.w3.org/2000/svg">
<rect width="35" height="35" fill="lightgreen"/> <text y="20">INT</text>
<text x="40" y="20">x = 4;</text>
</svg>
